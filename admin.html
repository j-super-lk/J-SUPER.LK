<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>J SUPER.LK - Admin Backend</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>

        body { font-family: 'Poppins', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }

        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }

        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }

        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }

        @keyframes blinker { 50% { opacity: 0; } }

        .blink-me { animation: blinker 1s linear infinite; }

        /* Login Overlay */

        #loginScreen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; }

    </style>

</head>

<body class="bg-slate-100 text-slate-800 h-screen flex overflow-hidden">



    <div id="loginScreen" class="hidden">

        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">

            <h2 class="text-2xl font-black mb-6 uppercase">Admin Login</h2>

            <input type="text" id="lUser" placeholder="Username" class="w-full p-3 mb-4 border rounded-xl bg-slate-50">

            <input type="password" id="lPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl bg-slate-50">

            <button onclick="handleLogin()" class="w-full bg-green-600 text-white font-black py-3 rounded-xl hover:bg-green-700">LOGIN</button>

        </div>

    </div>



    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-20 hidden md:flex shrink-0">

        <div class="p-6 border-b border-slate-800 text-center">

            <h1 class="text-2xl font-black text-green-400 uppercase tracking-widest border-2 border-green-500 rounded-lg p-2 bg-slate-800">Admin</h1>

            <p class="text-[10px] text-slate-400 mt-2 uppercase tracking-widest">J SUPER.LK Manager</p>

        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">

            <button onclick="switchTab('ordersTab')" id="btnOrders" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center justify-between group">

                <span class="flex items-center gap-3"><i class="fa-solid fa-bell text-yellow-400"></i> Live Orders</span>

                <span id="orderBadge" class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>

            </button>

            <button onclick="switchTab('reportsTab')" id="btnReports" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-chart-pie text-blue-400"></i> POS & Reports</button>

            <button onclick="switchTab('productsTab')" id="btnInventory" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-box text-green-400"></i> Inventory</button>

            <button onclick="switchTab('catsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-tags text-pink-400"></i> Categories</button>

            <button onclick="switchTab('adsTab')" id="btnAds" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-image text-purple-400"></i> Banners / Ads</button>

            <button onclick="switchTab('settingsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-gear text-orange-400"></i> Web Settings</button>

            <button onclick="switchTab('directorsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-users text-teal-400"></i> Directors Board</button>

            <button onclick="switchTab('staffTab')" id="btnStaff" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-red-900 transition font-bold text-sm flex items-center gap-3 text-red-300"><i class="fa-solid fa-user-shield"></i> Staff Management</button>

        </nav>

        <div class="p-4 border-t border-slate-800">

            <button onclick="logout()" class="w-full text-center bg-red-600 hover:bg-red-700 text-white font-black py-3 rounded-xl transition shadow-lg mb-2">LOGOUT</button>

            <a href="index.html" class="w-full block text-center bg-green-600 hover:bg-green-700 text-white font-black py-3 rounded-xl transition shadow-lg"><i class="fa-solid fa-globe mr-2"></i> VIEW SITE</a>

        </div>

    </aside>



    <main class="flex-1 flex flex-col h-full overflow-hidden relative">

        <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10 border-b border-slate-200">

            <h2 class="text-xl font-black text-slate-800" id="topTitle">Live Orders</h2>

        </header>



        <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 custom-scrollbar relative">

            <div id="ordersTab" class="tab-content active"><div id="ordersContainer"></div></div>

            <div id="reportsTab" class="tab-content">...</div>

            <div id="productsTab" class="tab-content">...</div>

            <div id="catsTab" class="tab-content">...</div>

            <div id="adsTab" class="tab-content">...</div>

            <div id="settingsTab" class="tab-content">...</div>

            <div id="directorsTab" class="tab-content">...</div>



            <div id="staffTab" class="tab-content max-w-4xl mx-auto">

                <h2 class="text-2xl font-black mb-4">Staff Management</h2>

                <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">

                    <input type="text" id="sUser" placeholder="Username" class="border p-2 rounded mb-2 w-full">

                    <input type="password" id="sPass" placeholder="Password" class="border p-2 rounded mb-2 w-full">

                    <div class="mb-4">

                        <label class="mr-4"><input type="checkbox" class="perm" value="orders"> Orders</label>

                        <label class="mr-4"><input type="checkbox" class="perm" value="inventory"> Inventory</label>

                        <label><input type="checkbox" class="perm" value="reports"> Reports</label>

                    </div>

                    <button onclick="addStaff()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Save Staff</button>

                </div>

            </div>

        </div>

    </main>



    <script>

        // --- AUTH LOGIC ---

        const defaultAdmin = { username: "admin", pass: "1234", role: "superadmin", permissions: ["orders", "inventory", "reports", "ads", "staff"] };

        

        function checkAuth() {

            const user = JSON.parse(localStorage.getItem('jsuper_loggedInUser'));

            if (!user) {

                document.getElementById('loginScreen').classList.remove('hidden');

            } else {

                document.getElementById('loginScreen').classList.add('hidden');

                applyPermissions(user);

            }

        }



        function handleLogin() {

            const u = document.getElementById('lUser').value;

            const p = document.getElementById('lPass').value;

            const users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];

            const found = users.find(x => x.username === u && x.pass === p);

            if (found) {

                localStorage.setItem('jsuper_loggedInUser', JSON.stringify(found));

                location.reload();

            } else { alert("වැරදි Username හෝ Password!"); }

        }



        function logout() {

            localStorage.removeItem('jsuper_loggedInUser');

            location.reload();

        }



        function applyPermissions(user) {

            if (user.role === 'superadmin') return; 

            const perms = user.permissions;

            if (!perms.includes('orders')) document.getElementById('btnOrders').style.display = 'none';

            if (!perms.includes('inventory')) document.getElementById('btnInventory').style.display = 'none';

            if (!perms.includes('reports')) document.getElementById('btnReports').style.display = 'none';

            if (!perms.includes('ads')) document.getElementById('btnAds').style.display = 'none';

            document.getElementById('btnStaff').style.display = 'none';

        }



        function addStaff() {

            const username = document.getElementById('sUser').value;

            const password = document.getElementById('sPass').value;

            const perms = Array.from(document.querySelectorAll('.perm:checked')).map(cb => cb.value);

            let users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];

            users.push({ username, pass: password, role: 'staff', permissions: perms });

            localStorage.setItem('jsuper_users', JSON.stringify(users));

            alert("සාර්ථකයි!");

        }



        function switchTab(tabId) {

            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');

        }

function openProductModal(id = null) {

            let cats = JSON.parse(localStorage.getItem('jsuper_cats')) || [];

            document.getElementById('pCat').innerHTML = cats.filter(c=>c.active!==false).map(c=>`<option value="${c.name}">${c.name}</option>`).join('');

            

            if(id) {

                let list = JSON.parse(localStorage.getItem('jsuper_products')) || [];

                let p = list.find(x => String(x.id).trim() === String(id).trim());

                if(p) {

                    document.getElementById('pId').value = p.id;

                    document.getElementById('pName').value = p.name;

                    document.getElementById('pWeight').value = p.isWeight;

                    document.getElementById('pCat').value = p.category;

                    updateSubcatDropdown();

                    document.getElementById('pSubcat').value = p.subcategory || '';

                    document.getElementById('pPrice').value = p.price;

                    document.getElementById('pDiscType').value = p.discType || 'none';

                    document.getElementById('pDiscVal').value = p.discVal || 0;

                    document.getElementById('pDesc').value = p.desc;

                    document.getElementById('pImgB64').value = p.img || '';

                    document.getElementById('pImgPreviewBox').innerHTML = p.img ? `<img src="${p.img}" class="w-full h-full object-cover">` : '<i class="fa-solid fa-image text-slate-300"></i>';

                }

            } else {

                document.getElementById('pId').value = '';

                document.getElementById('pName').value = '';

                document.getElementById('pPrice').value = '';

                document.getElementById('pDesc').value = '';

                document.getElementById('pDiscVal').value = '0';

                document.getElementById('pImgB64').value = '';

                document.getElementById('pImgPreviewBox').innerHTML = '<i class="fa-solid fa-image text-slate-300"></i>';

                updateSubcatDropdown();

            }

            document.getElementById('productModal').classList.remove('hidden');

        }



        function saveProduct(e) {

            e.preventDefault();

            let list = JSON.parse(localStorage.getItem('jsuper_products')) || [];

            let id = document.getElementById('pId').value;

            

            let obj = {

                id: id ? String(id).trim() : String(Date.now()),

                name: document.getElementById('pName').value,

                category: document.getElementById('pCat').value,

                subcategory: document.getElementById('pSubcat').value,

                price: document.getElementById('pPrice').value,

                isWeight: document.getElementById('pWeight').value,

                desc: document.getElementById('pDesc').value,

                discType: document.getElementById('pDiscType').value,

                discVal: document.getElementById('pDiscVal').value,

                img: document.getElementById('pImgB64').value

            };

            

            if(id) {

                list = list.map(x => String(x.id).trim() === String(id).trim() ? obj : x);

            } else {

                list.unshift(obj);

            }

            localStorage.setItem('jsuper_products', JSON.stringify(list));

            closeModal('productModal'); loadProducts();

        }

        

        function delProduct(id) {

            if(confirm("Delete product?")) {

                let list = JSON.parse(localStorage.getItem('jsuper_products'));

                localStorage.setItem('jsuper_products', JSON.stringify(list.filter(p => String(p.id).trim() !== String(id).trim()))); 

                loadProducts();

            }

        }



        // ================= SETTINGS =================

        function loadSettings() {

            let s = JSON.parse(localStorage.getItem('jsuper_settings')) || {navLinks:'J SUPER PRODUCTS, EXCLUSIVES'};

            document.getElementById('setWaAdmin').value = s.waAdmin || '94706717695';

            document.getElementById('setNavLinks').value = s.navLinks || '';

            document.getElementById('setBank').value = s.bank || '';

            document.getElementById('setPaypal').value = s.paypal || '';

            document.getElementById('setCrypto').value = s.crypto || '';

            document.getElementById('setAbout').value = s.about || '';

            document.getElementById('setFaq').value = s.faq || '';

            document.getElementById('setPrivacy').value = s.privacy || '';

            document.getElementById('setTerms').value = s.terms || '';

            document.getElementById('setDelivery').value = s.delivery || '';

            document.getElementById('setAddress').value = s.address || '';

            document.getElementById('setPhones').value = s.phones || '';

        }

        function saveWebSettings(e) {

            e.preventDefault();

            let s = {

                waAdmin: document.getElementById('setWaAdmin').value,

                navLinks: document.getElementById('setNavLinks').value,

                bank: document.getElementById('setBank').value,

                paypal: document.getElementById('setPaypal').value,

                crypto: document.getElementById('setCrypto').value,

                about: document.getElementById('setAbout').value,

                faq: document.getElementById('setFaq').value,

                privacy: document.getElementById('setPrivacy').value,

                terms: document.getElementById('setTerms').value,

                delivery: document.getElementById('setDelivery').value,

                address: document.getElementById('setAddress').value,

                phones: document.getElementById('setPhones').value

            };

            localStorage.setItem('jsuper_settings', JSON.stringify(s));

            alert("Settings Saved!");

        }





        

        checkAuth();

           // ================= LIVE ORDERS & SOUND =================

        let orderAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg'); 

        let audioContextEnabled = false;

        let lastOrderCount = 0;



        function enableAudioContext() {

            orderAudio.play().then(() => {

                orderAudio.pause(); orderAudio.currentTime = 0; audioContextEnabled = true;

                document.getElementById('enableSoundBtn').className = "bg-green-100 text-green-700 px-4 py-2 rounded-lg text-xs font-bold border border-green-200";

                document.getElementById('enableSoundBtn').innerHTML = '<i class="fa-solid fa-check mr-1"></i> Sound ON';

            }).catch(e => console.log(e));

        }

        function changeNotifSound(input) {

            const file = input.files[0];

            if(file) {

                const reader = new FileReader();

                reader.onload = e => { localStorage.setItem('jsuper_sound', e.target.result); orderAudio = new Audio(e.target.result); alert("Sound Updated"); };

                reader.readAsDataURL(file);

            }

        }

        function loadSavedSound() {

            const saved = localStorage.getItem('jsuper_sound'); if(saved) orderAudio = new Audio(saved);

        }



        function renderOrders() {

            const orders = JSON.parse(localStorage.getItem('jsuper_orders')) || [];

            document.getElementById('orderBadge').innerText = orders.length;

            if(orders.length > 0) document.getElementById('orderBadge').classList.remove('hidden'); else document.getElementById('orderBadge').classList.add('hidden');

            

            const container = document.getElementById('ordersContainer');

            if(orders.length === 0) { container.innerHTML = '<div class="p-8 text-center text-slate-400 font-bold">No orders yet.</div>'; return; }



            container.innerHTML = orders.map(o => {

                let itemsHtml = o.items.map(i => `<div class="text-[10px] text-slate-600 truncate border-b border-slate-100 last:border-0 pb-1 mb-1">- ${i.name} (${i.qty})</div>`).join('');

                let proofBtn = o.paymentProof ? `<a href="${o.paymentProof}" download="Proof_${o.id}" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded ml-2 font-bold"><i class="fa-solid fa-download"></i> Slip</a>` : '';

                return `

                <div class="p-4 hover:bg-slate-50 transition border-b flex flex-col md:flex-row justify-between gap-4">

                    <div class="flex-1">

                        <div class="flex items-center gap-2 mb-2">

                            <span class="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">${o.id}</span>

                            <span class="text-[10px] text-slate-500">${o.date}</span>

                            <span class="text-[10px] bg-purple-100 text-purple-800 px-2 py-0.5 rounded font-black uppercase">${o.paymentMethod}</span>

                            ${proofBtn}

                        </div>

                        <h4 class="font-black text-sm"><i class="fa-solid fa-user text-slate-400 mr-2"></i>${o.customer.name}</h4>

                        <p class="text-xs text-slate-600"><i class="fa-solid fa-phone text-slate-400 mr-2"></i>${o.customer.phone} | <i class="fa-solid fa-map-pin text-slate-400 mx-1"></i>${o.customer.address||'Pickup'}</p>

                        <div class="bg-slate-100 p-2 rounded mt-2 max-h-24 overflow-y-auto">${itemsHtml}</div>

                    </div>

                    <div class="text-right flex flex-col justify-between">

                        <div>

                            <select onchange="updateOrderStatus('${o.id}', this.value)" class="text-xs font-black p-1 border rounded focus:outline-none focus:border-green-500 mb-2">

                                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>

                                <option value="Processing" ${o.status==='Processing'?'selected':''}>Processing</option>

                                <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>

                                <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>

                                <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancelled</option>

                            </select>

                            <div class="font-black text-green-700 text-lg">Rs. ${parseFloat(o.total).toFixed(2)}</div>

                        </div>

                        <button onclick="delOrder('${o.id}')" class="text-red-500 text-[10px] hover:underline mt-2">Delete</button>

                    </div>

                </div>

                `;

            }).join('');

        }

        function updateOrderStatus(id, status) {

            let orders = JSON.parse(localStorage.getItem('jsuper_orders')) || [];

            orders = orders.map(o => { if(String(o.id) === String(id)) o.status = status; return o; });

            localStorage.setItem('jsuper_orders', JSON.stringify(orders));

        }

        function delOrder(id) {

            if(confirm("Delete this order?")) {

                let orders = JSON.parse(localStorage.getItem('jsuper_orders'));

                localStorage.setItem('jsuper_orders', JSON.stringify(orders.filter(o => String(o.id) !== String(id)))); renderOrders();

            }

        }

        function clearOrders() {

            if(confirm("Clear all orders?")) { localStorage.setItem('jsuper_orders', '[]'); lastOrderCount = 0; renderOrders(); }

        }

        function pollOrders() {

            const orders = JSON.parse(localStorage.getItem('jsuper_orders')) || [];

            if(orders.length > lastOrderCount) {

                if(lastOrderCount !== 0 && audioContextEnabled) {

                    orderAudio.play().catch(e=>{});

                    const badge = document.getElementById('orderBadge'); badge.classList.add('blink-me'); setTimeout(() => badge.classList.remove('blink-me'), 5000);

                }

                lastOrderCount = orders.length; renderOrders();

            } else if (orders.length < lastOrderCount) { lastOrderCount = orders.length; renderOrders(); }

        }



        // ================= REPORTS =================

        function generateSalesReport() {

            const start = document.getElementById('repStart').value;

            const end = document.getElementById('repEnd').value;

            const orders = JSON.parse(localStorage.getItem('jsuper_orders')) || [];

            let filtered = orders;

            if(start && end) {

                const sDate = new Date(start); const eDate = new Date(end); eDate.setHours(23, 59, 59);

                filtered = orders.filter(o => { const od = new Date(o.date); return od >= sDate && od <= eDate; });

            }

            let totalSales = filtered.filter(o => o.status !== 'Cancelled').reduce((sum, o) => sum + o.total, 0);

            document.getElementById('salesReportResult').innerHTML = `<div class="text-center"><p class="text-xs text-slate-500 font-bold uppercase mb-1">Total Sales</p><h2 class="text-3xl font-black text-green-700 mb-2">Rs. ${totalSales.toFixed(2)}</h2><p class="text-sm font-bold text-slate-700">Valid Orders: ${filtered.filter(o=>o.status!=='Cancelled').length}</p></div>`;

        }

        function populateReportCategories() {

            let cats = JSON.parse(localStorage.getItem('jsuper_cats')) || [];

            document.getElementById('repInvCat').innerHTML = '<option value="all">All Categories</option>' + cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

        }

        function generateInventoryReport() {

            const cat = document.getElementById('repInvCat').value;

            const inv = JSON.parse(localStorage.getItem('jsuper_products')) || [];

            let filtered = cat === 'all' ? inv : inv.filter(i => i.category === cat);

            let html = '<table class="w-full text-left text-xs"><tr class="border-b"><th class="pb-2">Item</th><th class="pb-2 text-right">Price</th></tr>';

            filtered.forEach(i => { html += `<tr class="border-b border-slate-100 last:border-0"><td class="py-2">${i.name}</td><td class="py-2 text-right text-green-700 font-bold">Rs. ${parseFloat(i.price).toFixed(2)}</td></tr>`; });

            html += '</table>';

            document.getElementById('invReportResult').innerHTML = html;

        }



        // ================= ADS & DIRECTORS =================

        function loadAds() {

            const ads = JSON.parse(localStorage.getItem('jsuper_ads')) || [];

            document.getElementById('adsGrid').innerHTML = ads.map(a => `<div class="relative rounded-xl overflow-hidden shadow border"><img src="${a.img}" class="w-full h-32 object-cover"><button onclick="delAd(${a.id})" class="absolute top-2 right-2 bg-red-600 text-white w-8 h-8 rounded-full shadow-lg"><i class="fa-solid fa-trash"></i></button></div>`).join('');

        }

        function saveAd(e) { e.preventDefault(); let list = JSON.parse(localStorage.getItem('jsuper_ads')) || []; list.push({ id: Date.now(), img: document.getElementById('adImgB64').value }); localStorage.setItem('jsuper_ads', JSON.stringify(list)); closeModal('adModal'); loadAds(); }

        function delAd(id) { let list = JSON.parse(localStorage.getItem('jsuper_ads')); localStorage.setItem('jsuper_ads', JSON.stringify(list.filter(a => a.id !== id))); loadAds(); }



        function loadDirectors() {

            const dirs = JSON.parse(localStorage.getItem('jsuper_directors')) || [];

            document.getElementById('adminDirGrid').innerHTML = dirs.map(d => `<div class="bg-white p-4 rounded-xl text-center shadow-sm border relative"><img src="${d.img}" class="w-16 h-16 rounded-full mx-auto object-cover mb-2 border"><h5 class="font-black text-sm">${d.name}</h5><p class="text-[10px] text-teal-600 font-bold">${d.role}</p><button onclick="delDir(${d.id})" class="absolute top-2 right-2 text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('');

        }

        function saveDirector(e) { e.preventDefault(); let list = JSON.parse(localStorage.getItem('jsuper_directors')) || []; list.push({ id: Date.now(), name: document.getElementById('dName').value, role: document.getElementById('dRole').value, img: document.getElementById('dImgB64').value }); localStorage.setItem('jsuper_directors', JSON.stringify(list)); closeModal('dirModal'); loadDirectors(); }

        function delDir(id) { let list = JSON.parse(localStorage.getItem('jsuper_directors')); localStorage.setItem('jsuper_directors', JSON.stringify(list.filter(d => d.id !== id))); loadDirectors(); }



    </script>

</body>

</html>
